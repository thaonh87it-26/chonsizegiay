<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Thông Tin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .form-container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .header-title { color: #d9534f; font-weight: bold; text-align: center; margin-bottom: 25px; }
        .btn-submit { width: 100%; background-color: #d9534f; color: white; border: none; padding: 10px; border-radius: 5px; }
        .btn-submit:hover { background-color: #c9302c; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h3 class="header-title">ĐĂNG KÝ THÔNG TIN</h3>
        
        <form id="registrationForm">
            <div class="mb-3">
                <label class="form-label">Họ và Tên</label>
                <input type="text" name="Họ tên" class="form-control" placeholder="VD: Nguyễn Văn A" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tuổi</label>
                <input type="number" name="Tuổi" class="form-control" placeholder="Nhập số tuổi" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Size Giày</label>
                <select name="Size giày" class="form-select" required>
                    <option value="">-- Chọn size --</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="tel" name="SĐT" class="form-control" placeholder="Nhập số điện thoại" required>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Gửi thông tin đăng ký</button>
        </form>
        
        <div id="statusMessage" class="mt-3 text-center" style="display:none;"></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx_66L3KYcNQuALBWpS9c52cld6_s-QvnoZ7CKAw4HPh57pkfsHPY4MSNmcN3G_ssWtYg/exec';
    const form = document.getElementById('registrationForm');
    const statusMessage = document.getElementById('statusMessage');

    // 1. TỰ ĐỘNG ĐIỀN THÔNG TIN NẾU ĐÃ CÓ TRONG LOCALSTORAGE
    window.onload = () => {
        const savedData = localStorage.getItem('user_registration');
        if (savedData) {
            const data = JSON.parse(savedData);
            // Điền lại các giá trị vào form
            Object.keys(data).forEach(key => {
                if(form.elements[key]) {
                    form.elements[key].value = data[key];
                }
            });
            statusMessage.style.display = 'block';
            statusMessage.innerHTML = '<span class="text-success">Bạn đã gửi thông tin trước đó. Bạn có thể cập nhật lại nếu muốn.</span>';
        }
    };

    // 2. XỬ LÝ KHI GỬI FORM
    form.addEventListener('submit', e => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = 'Đang gửi...';

        const formData = new FormData(form);
        const dataObj = Object.fromEntries(formData.entries());
        // THÊM CÁC DÒNG NÀY ĐỂ TRUY VẾT:
        const userAgent = navigator.userAgent; // Lấy thông tin trình duyệt/OS
        const screenRes = `${window.screen.width}x${window.screen.height}`; // Lấy độ phân giải màn hình
        
        formData.append('Browser_Info', userAgent);
        formData.append('Resolution', screenRes);
        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                // Lưu vào LocalStorage sau khi gửi thành công
                localStorage.setItem('user_registration', JSON.stringify(dataObj));
                
                alert('Đăng ký thành công!');
                statusMessage.style.display = 'block';
                statusMessage.innerHTML = '<span class="text-success">Thông tin của bạn đã được ghi nhận!</span>';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Cập nhật lại thông tin';
            })
            .catch(error => {
                console.error('Lỗi!', error.message);
                alert('Có lỗi xảy ra, vui lòng thử lại.');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Gửi lại';
            });
    });
</script>

</body>
</html>
